name: test

on:
  push:
    branches:
      # run on each branch when push
      - '*'
    tags-ignore:
      # ignore all the tag
      - '*'
  pull_request:
    branches:
      # only consider the PR to master branch
      - master

jobs:
  container-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1
      - run: go version
      - uses: actions/setup-go@v2
        with:
          stable: false
          go-version: '1.16.0'
      - run: go version
      - run: |
          make
